<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff, #dbeafe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #0066cc;
            margin-bottom: 25px;
        }

        p {
            font-size: 18px;
            margin: 15px 0;
        }

        .label {
            color: #0066cc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Data Mahasiswa</h1>

        <p>
            <span class="label">Nama :</span>
            Adrian Iskandar
        </p>

        <p>
            <span class="label">NIM :</span>
            051463668
        </p>
    </div>

</body>
</html>
